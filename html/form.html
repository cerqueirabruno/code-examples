<!-- FORM TEXTAREA -->
<form>
    <fieldset>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="João da Silva" readonly>

        <label for="comentario">Comentário:</label>
        <textarea id="comentario" name="comentario" readonly>
            Este é um comentário de exemplo que o usuário não pode editar.
        </textarea>
    </fieldset>
</form>

<!-- FORM SELECT + OPTGROUP + OPTION -->
<fieldset>
    <label for="">Selecione sua fruta</label>
    <select name="frutas">
        <optgroup label="Frutas cítricas">
            <option value="laranja">Laranja</option>
            <option value="limao">Limão</option>
        </optgroup>

        <optgroup label="Frutas vermelhas">
            <option value="morango">Morango</option>
            <option value="framboesa">Framboesa</option>
        </optgroup>

        <optgroup label="Outras frutas">
            <option value="maca">Maçã</option>
            <option value="banana">Banana</option>
        </optgroup>
    </select>
</fieldset>
