<h1> ... </h1> <!-- ++++++ -->
<h2> ... </h2> <!-- +++++ -->
<h3> ... </h3> <!-- ++++ -->
<h4> ... </h4> <!-- +++ -->
<h5> ... </h5> <!-- ++ -->
<h6> ... </h6> <!-- + -->

<p> ... </p> <!-- parágrafo -->
<b> ... </b> <!-- negrito -->
<i> ... </i> <!-- itálico -->

<strong> ... </strong> <!-- enfatizar o texto em negrito -->
<em> ... </em> <!-- enfatizar o texto em itálico -->

<br> <!-- quebra de linha -->

<!-- ===== ===== ===== divisões ===== ===== ===== -->

<div> ... </div> <!-- block -->
<span> ... </span> <!-- inline -->

<aside> ... </aside>
<!-- define um bloco de conteúdo relacionado ao conteúdo principal. geralmente exibido como uma barra lateral -->

<section> ... </section> <!--  -->
<article> ... </article> <!--  -->

<!-- ===== ===== ===== lista ===== ===== ===== -->

<nav> <!-- navegação -->
    <ul> <!-- lista não ordenada -->
        <li>item 1</li> <!-- list itens -->
        <li>item 2</li>
        <li>item 3</li>
    </ul>
</nav>

<nav>
    <ol> <!-- lista ordenada -->
        <li>item 1</li> <!-- list itens -->
        <li>item 2</li>
        <li>item 3</li>
    </ol>
</nav>

<!-- ===== ===== ===== âncora ===== ===== ===== -->

<a href="https://www.google.com/" target="_blank">google</a> <!-- âncora externa -->

<a href="#id"> ... </a> <!-- âncora interna -->

<!-- target="_blank" = abrir em uma outra aba -->
